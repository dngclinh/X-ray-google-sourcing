      - Polski
    speaking_forms:
      - Polish-speaking

  - canonical: Spanish
    names:
      - Spanish
      - Español
    speaking_forms:
      - Spanish-speaking
      - Hispanophone

  - canonical: Italian
    names:
      - Italian
