# Generic location knowledge: canonical countries, their English/local
# name variants, selected city aliases, and — only when verified — the
# LinkedIn country ccTLD used for `site:<cc>.linkedin.com/in` searches.
#
# This file is generic geographic knowledge, not profession-specific
# knowledge (CLAUDE.md section 4/5): it must not be edited to encode
# job-family, title, or skill information.
#
# Per CLAUDE.md section 5, a ccTLD narrows results by LinkedIn
# domain/locale but never replaces the location block — explicit
# location terms must always be kept alongside it. Omit `cctld` for any
# country where the LinkedIn localized domain hasn't been verified.
