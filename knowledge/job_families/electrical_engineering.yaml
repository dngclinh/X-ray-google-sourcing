# Electrical Engineering job-family pack (CLAUDE.md section 4, category 2:
# dictionary-driven, profession-specific knowledge). Schema per
# src/xray/knowledge_loader.py; field meanings documented in
# knowledge/job_families/_schema_example.yaml.
#
# Local-market focus: English + German (DACH region). Every German term
# below is a real, known market equivalent (job title, technical term, or
# abbreviation) — none are invented translations, per CLAUDE.md section 7
# ("the engine does not translate or infer local-language terms on the
# fly" applies equally to how this pack is authored).
#
# Technical evidence (skill_groups) is deliberately grouped by
# specialization domain rather than dumped into one generic "electrical
# skills" bucket, and is gated the same way every other pack is: a term
# only ever enters a SearchSpec when it is literally present in the JD
# (src/xray/extractor.py) — this pack does not, and cannot, force every
# technical group to activate just because the family is "Electrical
# Engineering".

family: "Electrical Engineering"

family_signals:
  - "electrical engineering"
  - "electrical engineer"
  - "elektrotechnik"
  - "elektroingenieur"
  - "elektroingenieurin"

# Title groups: "engineer" is the base role_type; every other group is a
# seniority tier. Per CLAUDE.md section 6, seniority is a title modifier,
# not folded into the base role_type group.
titles:
  - id: "engineer"
    group_type: "role_type"
    terms:
      - "Electrical Engineer"
      - "Elektroingenieur"
      - "Elektroingenieurin"

  - id: "senior"
    group_type: "seniority"
    terms:
      - "Senior Electrical Engineer"
      - "Senior Elektroingenieur"
      - "Senior Elektroingenieurin"
    weight: 0.65

  - id: "lead"
    group_type: "seniority"
    terms:
      - "Lead Electrical Engineer"
      - "Electrical Engineering Lead"
      - "Leitender Elektroingenieur"
    weight: 0.7

  - id: "principal"
    group_type: "seniority"
    terms:
      - "Principal Electrical Engineer"
      - "Principal Elektroingenieur"
    weight: 0.8

  - id: "design_lead"
    group_type: "seniority"
    terms:
      - "Electrical Design Lead"
      - "Design Lead Electrical Engineering"
    weight: 0.72

specializations:
  - id: "data_center_mission_critical"
    name: "Data Center / Mission Critical"
    terms:
      - "Data Center Electrical Engineer"
      - "Critical Facilities Electrical Engineer"
      - "Mission Critical Electrical Engineer"
    weight: 0.6

  - id: "building_services_mep"
    name: "Building Services / MEP"
    terms:
      - "Building Services Electrical Engineer"
      - "MEP Electrical Engineer"
    weight: 0.55

  - id: "industrial_power"
    name: "Industrial Power"
    terms:
      - "Industrial Power Engineer"
      - "Industrial Electrical Engineer"
    weight: 0.55

# specialization_signals: JD trigger phrases (English + German) that
# activate the matching specialization. Only the data-center list is
# drawn from the explicitly approved relationship set; the other two
# specializations use equally well-established, standard industry/market
# terms (e.g. German "TGA" for building services, "Industrieanlagen" for
# industrial facilities) rather than invented synonyms. "hyperscale",
# "colocation", "Tier III"/"Tier IV" are confirmed strong, standalone
# data-center facility-class signals — unlike a bare technical skill
# term (e.g. "UPS", "switchgear"), which never feeds specialization
# detection on its own (see skill_groups below).
specialization_signals:
  data_center_mission_critical:
    - "data center"
    - "data centre"
    - "data centers"
    - "data centres"
    - "Datacenter"
    - "Datacenters"
    - "Rechenzentrum"
    - "Rechenzentren"
    - "mission critical"
    - "mission-critical"
    - "critical facilities"
    - "critical facility"
    - "hyperscale"
    - "colocation"
    - "Tier III"
    - "Tier IV"
  building_services_mep:
    - "building services"
    - "MEP"
    - "mechanical, electrical and plumbing"
    - "mechanical electrical and plumbing"
    - "TGA"
    - "Gebäudetechnik"
  industrial_power:
    - "industrial power"
    - "heavy industry"
    - "process industry"
    - "Industrieanlagen"
    - "Industrieelektrik"

# industries: domain/vertical evidence that feeds the Core Function/
# Industry evidence clause (CLAUDE.md section 6) — the first three
# mirror the three specializations above, since each specialization is
# also an industry vertical within Electrical Engineering; the last
# three (digital_infrastructure_industry, engineering_consulting_industry,
# industrial_practice_industry) are additional standalone domain
# vertical/sector evidence not tied to a specific specialization.
industries:
  - id: "data_center_industry"
    name: "Data Center / Mission Critical"
    terms:
      - "data center"
      - "data centre"
      - "data centers"
      - "data centres"
      - "Datacenter"
      - "Datacenters"
      - "Rechenzentrum"
      - "Rechenzentren"
      - "mission critical"
      - "mission-critical"
      - "critical facilities"
      - "critical facility"
      - "hyperscale"
      - "colocation"
    weight: 0.3

  - id: "building_services_industry"
    name: "Building Services / MEP"
    terms:
      - "building services"
      - "MEP"
      - "mechanical, electrical and plumbing"
      - "mechanical electrical and plumbing"
      - "TGA"
      - "Gebäudetechnik"
    weight: 0.3

  - id: "industrial_power_industry"
    name: "Industrial Power"
    terms:
      - "industrial power"
      - "heavy industry"
      - "process industry"
      - "Industrieanlagen"
      - "Industrieelektrik"
    weight: 0.3

  - id: "digital_infrastructure_industry"
    name: "Digital Infrastructure"
    terms:
      - "digital infrastructure"
    weight: 0.3

  - id: "engineering_consulting_industry"
    name: "Engineering Consulting"
    terms:
      - "engineering consultancy"
    weight: 0.3

  - id: "industrial_practice_industry"
    name: "Industrial Practice"
    terms:
      - "industrial practice"
    weight: 0.3

