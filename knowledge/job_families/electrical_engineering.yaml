# core_functions: activity/process evidence (CLAUDE.md section 6 — Core
# Function evidence, distinct from Industry evidence). Placement rule:
# activity/process terms (due diligence, planning, coordination,
# communication) live here; concrete technical/domain nouns (HV/MV,
# switchgear, BIM, Tier III, etc.) live in skill_groups above. Every
# term uses literal, verbatim JD wording it was grounded against, not a
# paraphrase.
core_functions:
  - id: "technical_due_diligence"
    name: "Technical Due Diligence"
    terms:
      - "technical due diligence"
      - "site due diligence"
    weight: 0.4

  - id: "electrical_planning"
    name: "Electrical Planning"
    terms:
      - "electrical planning"
    weight: 0.4

  - id: "multidisciplinary_coordination"
    name: "Multidisciplinary Coordination"
    terms:
      - "multidisciplinary teams"
    weight: 0.35

  - id: "stakeholder_communication"
    name: "Stakeholder Communication"
    terms:
      - "stakeholder communication"
    weight: 0.3

# hidden_title_signals: adjacent/feeder titles for the Hidden Titles
# variant (CLAUDE.md section 7 known limitation: not yet consumed by
# extraction/assembly — schema-only until that mechanism exists).
hidden_title_signals:
  - "Electrical Design Engineer"
  - "Power Systems Engineer"
  - "Building Services Engineer"
  - "MEP Engineer"
  - "Electrical Project Engineer"
  - "Projektleiter Elektrotechnik"
  - "Elektroplaner"
  - "Fachplaner Elektrotechnik"

# exclusions: profession-specific disqualifying terms — Electrical
# Engineering is a distinct, degree-level discipline from the
# vocational/trade roles below (CLAUDE.md section 7: not consumed by
# query assembly yet, same schema-only status as hidden_title_signals).
exclusions:
  - "Electrician"
  - "Elektriker"
  - "Electrical Technician"
  - "Elektrotechniker"

# local_market_terms: German title variants for this family, for
# traceability/documentation (schema-only — see hidden_title_signals
# note above). The functionally-matched subset is also present in
# `titles` above, since only `titles`/`industries`/`skill_groups` are
# actually consulted by extraction today.
local_market_terms:
